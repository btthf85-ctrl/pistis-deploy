<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#050316" />
<meta name="robots" content="noindex, nofollow" />
<title>¡Gracias por tu compra! — Pistis Sophia Core</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Outfit:wght@300..600&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet" />

<style>
  :root {
    --navy: #050316;
    --deep: #0d1226;
    --violet: #7c3aed;
    --violet-bright: #a855f7;
    --aqua: #22d3ee;
    --gold: #f0c244;
    --gold-soft: #fcd34d;
    --paper: #f5f3ff;
    --paper-mute: #94a3b8;
    --line: rgba(167, 139, 250, 0.2);
    --whatsapp: #25d366;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Outfit', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--navy);
    color: var(--paper);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    overflow-x: hidden;
    position: relative;
  }
  /* Background glow */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.15), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(34, 211, 238, 0.08), transparent 60%),
      linear-gradient(180deg, #050316, #0a0820);
    z-index: -1;
  }

  .card {
    max-width: 560px;
    width: 100%;
    background: linear-gradient(155deg, rgba(20, 12, 50, 0.9), rgba(10, 8, 32, 0.95));
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 3rem 2.5rem;
    text-align: center;
    position: relative;
    box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.6);
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Success checkmark */
  .checkmark-wrap {
    width: 88px;
    height: 88px;
    margin: 0 auto 1.75rem;
    position: relative;
  }
  .checkmark-circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--aqua));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 40px -8px rgba(124, 58, 237, 0.6);
    animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .checkmark-circle svg {
    width: 44px;
    height: 44px;
    stroke: white;
    stroke-width: 3;
    fill: none;
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    animation: draw 0.5s ease-out 0.5s forwards;
  }
  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--aqua);
    margin-bottom: 1rem;
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  h1 em {
    font-style: italic;
    background: linear-gradient(110deg, var(--gold), var(--violet-bright));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--paper-mute);
    margin-bottom: 2rem;
  }

  /* Status box */
  .status-box {
    background: rgba(240, 194, 68, 0.07);
    border: 1px solid rgba(240, 194, 68, 0.25);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .status-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    border-radius: 10px;
    background: rgba(240, 194, 68, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
  }
  .status-text {
    flex: 1;
  }
  .status-title {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }
  .status-desc {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--paper);
  }
  .status-desc .spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid rgba(240, 194, 68, 0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* WhatsApp button */
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: linear-gradient(120deg, var(--whatsapp), #128c7e);
    color: white;
    text-decoration: none;
    padding: 1rem 2rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 1rem;
    box-shadow: 0 14px 40px -12px rgba(37, 211, 102, 0.6);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .wa-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 50px -12px rgba(37, 211, 102, 0.8);
  }
  .wa-btn svg { width: 20px; height: 20px; fill: currentColor; }

  .home-link {
    display: block;
    margin-top: 1.5rem;
    color: var(--paper-mute);
    text-decoration: none;
    font-size: 0.85rem;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    transition: color 0.25s;
  }
  .home-link:hover { color: var(--paper); }

  .footer-note {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--paper-mute);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="checkmark-wrap">
      <div class="checkmark-circle">
        <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      </div>
    </div>

    <div class="eyebrow">✦ Pago Confirmado</div>
    <h1>¡Gracias por tu <em>compra</em>!</h1>
    <p class="subtitle">
      Tu pago se procesó correctamente. Estamos enviando tu
      Informe de Madurez en IA a tu correo electrónico.
    </p>

    <div class="status-box">
      <div class="status-icon">📧</div>
      <div class="status-text">
        <div class="status-title">Enviando tu informe</div>
        <div class="status-desc" id="status-desc">
          Procesando<span class="spinner"></span>
        </div>
      </div>
    </div>

    <a href="https://wa.link/f41oyi" class="wa-btn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
      Agendar mi sesión estratégica
    </a>

    <a href="/" class="home-link">← Volver al inicio</a>

    <div class="footer-note">
      PISTIS SOPHIA CORE · pistissophiacore.com
    </div>
  </div>

<script>
(() => {
  'use strict';

  // ════════════════════════════════════════════════════════════
  // CONFIGURACIÓN — Webhook de n8n para entrega del PDF tras pago confirmado.
  // Workflow correspondiente: PSC 2 — Entrega de PDF (Gemini + PDFShift)
  // ════════════════════════════════════════════════════════════
  const N8N_WEBHOOK_URL = 'https://n8n-po5n.srv1769442.hstgr.cloud/webhook/pago-exitoso';

  const statusDesc = document.getElementById('status-desc');

  // Recuperar los datos del cliente guardados antes del pago.
  // Usamos localStorage (no sessionStorage) porque Mercado Pago abre esta
  // página en un contexto nuevo y sessionStorage no sobrevive la redirección.
  let lead = null;
  try {
    const raw = localStorage.getItem('psc_lead') || sessionStorage.getItem('psc_lead');
    if (raw) lead = JSON.parse(raw);
  } catch (e) {
    console.warn('No se pudo leer el almacenamiento local:', e);
  }

  async function enviarInforme() {
    // Si no hay datos guardados, mostrar mensaje pidiendo contacto
    if (!lead || !lead.email) {
      statusDesc.innerHTML = 'No encontramos tus datos. Por favor escríbenos por WhatsApp para enviarte tu informe.';
      return;
    }

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: lead.name || 'Cliente',
          email: lead.email,
          company: lead.company || '',
          website: lead.website || '',
          score: lead.score || null,
          tier: lead.tier || '',
          paidAt: new Date().toISOString()
        })
      });

      if (response.ok) {
        statusDesc.innerHTML = '✓ ¡Listo! Tu informe fue enviado a <strong>' + lead.email + '</strong>. Revisa tu bandeja de entrada (y spam).';
        // Limpiar los datos ya usados de ambos almacenamientos
        try { localStorage.removeItem('psc_lead'); sessionStorage.removeItem('psc_lead'); } catch (e) {}
      } else {
        statusDesc.innerHTML = 'Tu pago fue exitoso. Si no recibes el informe en unos minutos, escríbenos por WhatsApp.';
      }
    } catch (err) {
      console.error('Error al enviar al webhook:', err);
      statusDesc.innerHTML = 'Tu pago fue exitoso. Si no recibes el informe en unos minutos, escríbenos por WhatsApp.';
    }
  }

  // Disparar el envío al cargar la página
  enviarInforme();
})();
</script>
</body>
</html>
